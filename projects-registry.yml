# Project Friendliness Registry
# Tracks which projects are receptive to AI-generated contributions.
# Updated based on real PR attempts and outcomes.

# Fields:
#   owner/repo:
#     ai_friendly: true | moderate | false | unknown
#     stars: int
#     language: string
#     notes: string — context about the project's attitude
#     recommended_first_pr_type: docs | test | bug-fix | ci | tooling
#     merge_likelihood: high | moderate | low | very-low

# Legend:
#   true     = Merged an AI PR or explicitly accepts automated contributions
#   moderate = No explicit policy, maintainer responsive to external PRs
#   false    = Rejected AI PRs or explicitly prohibits automated contributions
#   unknown  = No data yet — haven't submitted or observed

