# Auto-PR Workflow 配置文件
# 将此文件放在项目根目录

# 项目配置
project:
  # 项目类型（auto, rust, node, python, go）
  type: auto
  
  # 编码风格
  style:
    # 使用 var 还是 const/let
    use_var: false
    # 使用箭头函数
    use_arrow_functions: true
    # 服务端模块系统（commonjs, esm）
    server_module: commonjs
    # 客户端模块系统（commonjs, esm）
    client_module: esm

# PR 配置
pr:
  # 默认分支
  base_branch: main
  
  # Commit message 规范（angular, conventional, custom）
  commit_style: angular
  
  # 自动添加 Co-Authored-By
  add_co_authored_by: false
  
  # PR 模板
  template: .github/pull_request_template.md

# CI 配置
ci:
  # 监控间隔（秒）
  watch_interval: 30
  
  # 最大修复尝试次数
  max_fix_attempts: 3
  
  # 自动修复
  auto_fix: true
  
  # 自动合并
  auto_merge: false

# AI 审查配置
review:
  # 启用 Copilot 审查
  copilot: true
  
  # 启用 CodeRabbit 审查
  coderabbit: true
  
  # 审查超时（秒）
  timeout: 300

# 本地检查配置
checks:
  # 语法检查
  syntax: true
  
  # Lint
  lint: true
  
  # 测试
  test: true
  
  # 类型检查
  typecheck: false
  
  # 构建
  build: false

# 日志配置
logging:
  # 日志级别（debug, info, warn, error）
  level: info
  
  # 保存日志到文件
  save_to_file: false
  
  # 日志文件路径
  file: .auto-pr.log
